<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Pro 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 md:p-12">
    <div class="max-w-5xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
        <h1 class="text-3xl font-black text-center text-indigo-700 mb-10">Library Management System</h1>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 bg-indigo-50 p-6 rounded-xl">
            <input id="titleInp" type="text" placeholder="বইয়ের নাম" class="p-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-400">
            <input id="authorInp" type="text" placeholder="লেখকের নাম" class="p-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-400">
            <button id="submitBtn" onclick="handleSubmit()" class="bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">Add Book</button>
            <input id="searchBar" type="text" onkeyup="loadBooks()" placeholder="খুঁজুন (Search)..." class="p-3 border rounded-lg border-indigo-300 outline-none focus:ring-2 focus:ring-indigo-400">
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-indigo-600 text-white">
                        <th class="p-4 rounded-tl-lg">ID</th>
                        <th class="p-4">বইয়ের নাম</th>
                        <th class="p-4">লেখক</th>
                        <th class="p-4 text-center">স্ট্যাটাস</th>
                        <th class="p-4 text-center rounded-tr-lg">অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody id="bookList" class="divide-y divide-gray-200"></tbody>
            </table>
        </div>
    </div>

    <script src="app.js">
     
    </script>
</body>
</html>
