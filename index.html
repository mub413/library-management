<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-5 md:p-12">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-3xl font-extrabold text-center text-indigo-700 mb-8">Library Management System</h1>

        <div class="bg-indigo-50 p-4 rounded-lg mb-8 flex flex-col md:flex-row gap-3">
            <input id="titleInp" type="text" placeholder="বইয়ের নাম" class="flex-1 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <input id="authorInp" type="text" placeholder="লেখকের নাম" class="flex-1 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <button id="mainBtn" onclick="handleSubmit()" class="bg-indigo-600 text-white px-6 py-2 rounded font-bold hover:bg-indigo-700 transition">Add Book</button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-indigo-600 text-white">
                        <th class="p-3">ID</th>
                        <th class="p-3">Title</th>
                        <th class="p-3">Author</th>
                        <th class="p-3 text-center">Status</th>
                        <th class="p-3 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="bookTableBody">
                    </tbody>
            </table>
        </div>
    </div>
 
    <script src="app.js">

    </script>
</body>
</html>
